apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: totalservice-ingress
  namespace: totalservice
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  ingressClassName: nginx
  rules:
    - host: totalservice.local
      http:
        paths:
          - path: /grpc/(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: envoy-svc
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-svc
                port:
                  number: 80
