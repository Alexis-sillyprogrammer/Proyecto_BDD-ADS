apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: totalservice
spec:
  replicas: 2
  selector:
    matchLabels: { app: backend }
  template:
    metadata:
      labels: { app: backend }
    spec:
      containers:
        - name: backend
          image: localhost/totalservice-backend-grpc:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 50051
          envFrom:
            - configMapRef: { name: backend-config }
            - secretRef: { name: backend-secret }
          readinessProbe:
            tcpSocket: { port: 50051 }
            initialDelaySeconds: 5
          livenessProbe:
            tcpSocket: { port: 50051 }
            initialDelaySeconds: 10
