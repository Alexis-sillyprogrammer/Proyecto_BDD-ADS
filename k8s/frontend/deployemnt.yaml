apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: totalservice
spec:
  replicas: 2
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      containers:
        - name: frontend
          image: localhost/totalservice-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80